# RallyLens — full local stack: Postgres + FastAPI + Next.js
# Usage:  docker compose up --build
# Then open http://localhost:3000  (demo@rallylens.app / password123)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rallylens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rallylens}
      POSTGRES_DB: ${POSTGRES_DB:-rallylens}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rallylens}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-rallylens}:${POSTGRES_PASSWORD:-rallylens}@db:5432/${POSTGRES_DB:-rallylens}
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me-please-0123456789}
      STORAGE_DIR: /data/storage
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SEED_ON_START: "true"
    volumes:
      - storage:/data/storage
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
  storage:
